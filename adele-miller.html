<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Adele Miller</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0a;
  }

  /* ── Background ── */
  .bg-wrap {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  .bg-wrap picture,
  .bg-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 50% 20%;
    display: block;
  }

  /* ── Overlays ── */
  .overlay-dark {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: rgba(10, 10, 10, 0.55);
  }

  .overlay-vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse at 50% 50%, transparent 25%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
  }

  /* ── Particles ── */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 3;
    overflow: hidden;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    animation: float-up linear infinite;
    opacity: 0;
  }

  @keyframes float-up {
    0%   { transform: translateY(105vh) translateX(0)             scale(0);   opacity: 0; }
    8%   { opacity: 0.8; }
    85%  { opacity: 0.3; }
    100% { transform: translateY(-10vh)  translateX(var(--drift)) scale(1.2); opacity: 0; }
  }

  .particle:nth-child(1)  { width:3px;  height:3px;  left:8%;   animation-duration:8s;  animation-delay:0s;    --drift:20px;  }
  .particle:nth-child(2)  { width:2px;  height:2px;  left:18%;  animation-duration:11s; animation-delay:1.5s;  --drift:-15px; }
  .particle:nth-child(3)  { width:4px;  height:4px;  left:27%;  animation-duration:9s;  animation-delay:0.8s;  --drift:30px;  }
  .particle:nth-child(4)  { width:2px;  height:2px;  left:38%;  animation-duration:13s; animation-delay:3s;    --drift:-20px; }
  .particle:nth-child(5)  { width:3px;  height:3px;  left:47%;  animation-duration:10s; animation-delay:2s;    --drift:10px;  }
  .particle:nth-child(6)  { width:2px;  height:2px;  left:55%;  animation-duration:7s;  animation-delay:4s;    --drift:-25px; }
  .particle:nth-child(7)  { width:3px;  height:3px;  left:63%;  animation-duration:12s; animation-delay:1s;    --drift:15px;  }
  .particle:nth-child(8)  { width:4px;  height:4px;  left:72%;  animation-duration:9s;  animation-delay:2.5s;  --drift:-10px; }
  .particle:nth-child(9)  { width:2px;  height:2px;  left:81%;  animation-duration:11s; animation-delay:0.5s;  --drift:20px;  }
  .particle:nth-child(10) { width:3px;  height:3px;  left:88%;  animation-duration:8s;  animation-delay:3.5s;  --drift:-30px; }
  .particle:nth-child(11) { width:2px;  height:2px;  left:93%;  animation-duration:14s; animation-delay:1.2s;  --drift:5px;   }
  .particle:nth-child(12) { width:3px;  height:3px;  left:33%;  animation-duration:10s; animation-delay:5s;    --drift:-12px; }

  /* ── Headline ── */
  .headline-wrap {
    position: fixed;
    top: 58%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 100%;
    padding: 0 24px;
    display: flex;
    justify-content: center;

    animation: fade-up 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s both;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateX(-50%) translateY(18px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0);    }
  }

  .headline-pill {
    display: inline-block;
    background: rgba(15, 10, 14, 0.72);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 16px;
    padding: 18px 32px;
    max-width: 800px;
    width: 100%;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.07);
  }

  .headline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 300;
    font-size: 40px;
    color: #fff;
    letter-spacing: 0.01em;
    line-height: 1.2;
  }

  /* ── CTAs ── */
  .cta-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 20;
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 24px 24px max(24px, env(safe-area-inset-bottom));

    animation: fade-up-cta 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.9s both;
  }

  @keyframes fade-up-cta {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0);    }
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60px;
    padding: 0 64px;
    border-radius: 48px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    font-size: 16px;
    letter-spacing: 0.025em;
    color: #fff;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: rgba(255, 255, 255, 0.14);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover::after  { opacity: 1; }
  .btn:active::after { opacity: 0.3; }
  .btn:hover         { transform: scale(1.03); }
  .btn:active        { transform: scale(0.98); }

  .btn-of {
    background: #B239B5;
  }
  .btn-of:hover {
    box-shadow: 0 8px 32px rgba(178, 57, 181, 0.55);
  }

  .btn-tg {
    background: #43A0F3;
  }
  .btn-tg:hover {
    box-shadow: 0 8px 32px rgba(67, 160, 243, 0.55);
  }

  /* ── Mobile (≤640px) ── */
  @media (max-width: 640px) {
    .cta-wrap {
      flex-direction: column;
      gap: 12px;
      padding: 20px 24px max(20px, env(safe-area-inset-bottom));
    }
    .btn {
      width: 100%;
      padding: 0 32px;
      height: 58px;
      font-size: 15px;
    }
    .headline {
      font-size: 22px;
    }
    .headline-pill {
      padding: 14px 20px;
    }
  }

  /* ── Small phones (≤380px) ── */
  @media (max-width: 380px) {
    .headline { font-size: 18px; }
    .headline-pill { padding: 12px 16px; }
    .btn { height: 52px; font-size: 14px; }
  }

  /* ── Landscape on small screens ── */
  @media (orientation: landscape) and (max-height: 500px) {
    .headline { font-size: 20px; }
    .headline-wrap { top: 42%; }
    .headline-pill { padding: 12px 22px; }
    .cta-wrap {
      flex-direction: row;
      gap: 12px;
      padding: 12px 24px max(12px, env(safe-area-inset-bottom));
    }
    .btn { height: 48px; padding: 0 40px; font-size: 14px; }
  }
</style>
</head>
