    .text-line {
      position: fixed;
      left: 50%;
      top: 58%;
      transform: translateX(-50%);
      width: 88%;
      max-width: 800px;
      background: rgba(15, 10, 14, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 14px 28px;
      text-align: center;
      font-size: clamp(1.1rem, 5vw, 2.5rem);
      font-weight: 700;
      color: #F5E6EF;
      letter-spacing: -0.3px;
      line-height: 1.3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      z-index: 10;
      opacity: 0;
      animation: fadeInUp 0.6s ease 0.2s forwards;
      will-change: transform, opacity;
    }

    .cta-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px 20px 28px;
      background: linear-gradient(transparent, rgba(15, 10, 14, 0.75));
      z-index: 10;
      opacity: 0;
      animation: fadeInUpFull 0.6s ease 0.5s forwards;
      will-change: transform, opacity;
    }

    @media (min-width: 481px) {
      .cta-container {
        flex-direction: row;
        max-width: 800px;
        left: 50%;
        transform: translateX(-50%);
        right: auto;
        width: 100%;
        animation-name: fadeInUpCentered;
      }
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 60px;
      padding: 0 30px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      border-radius: 48px;
      border: none;
      cursor: pointer;
      width: 100%;
      text-decoration: none;
      color: #ffffff;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform, box-shadow;
    }

    .btn-primary {
      background-color: rgb(41, 182, 246);
      box-shadow: 0 8px 20px rgba(41, 182, 246, 0.35);
    }
    .btn-primary:hover {
      background-color: rgb(79, 195, 247);
      transform: scale(1.03);
      box-shadow: 0 0 32px rgba(41, 182, 246, 0.55);
    }

    .btn-secondary {
      background-color: rgb(219, 39, 119);
      box-shadow: 0 8px 20px rgba(219, 39, 119, 0.35);
    }
    .btn-secondary:hover {
      background-color: rgb(236, 72, 153);
      transform: scale(1.03);
      box-shadow: 0 0 32px rgba(236, 72, 153, 0.55);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(16px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes fadeInUpFull {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUpCentered {
      from { opacity: 0; transform: translateX(-50%) translateY(16px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .text-line, .cta-container {
        animation: none;
        opacity: 1;
      }
    }
